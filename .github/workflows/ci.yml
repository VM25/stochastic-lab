name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dependencies are fetched by CMake FetchContent; cache the download stamp
  # directory so CI does not re-clone them on every run.
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.deps-cache

jobs:
  # ---------------------------------------------------------------------------
  # Build and test across the supported compilers.
  #
  # TECHNICAL-DESIGN section 23 requires clean-environment builds on both GCC and
  # Clang. Debug and Release are both exercised because they differ in assertion
  # behaviour and optimisation, and numerical code can pass one and fail the
  # other.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        preset: [debug, release]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-18
            cxx: clang++-18

    steps:
      - uses: actions/checkout@v4
        with:
          # A shallow clone still yields a full commit hash, which is what the
          # build metadata records.
          fetch-depth: 1

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.cxx }}

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      - name: Verify CLI rejects a malformed configuration
        run: |
          set -euo pipefail
          BIN=build/${{ matrix.preset }}/src/diffusionworks

          # A malformed configuration must fail explicitly with a nonzero exit
          # code rather than fall back to defaults.
          printf '{not json' > /tmp/malformed.json
          if $BIN price --config /tmp/malformed.json; then
            echo "FAIL: malformed configuration was accepted"
            exit 1
          fi

          # An unsupported schema version must be rejected, not reinterpreted.
          printf '{"schema_version": 999}' > /tmp/badversion.json
          if $BIN price --config /tmp/badversion.json; then
            echo "FAIL: unsupported schema_version was accepted"
            exit 1
          fi

          # Usage errors and runtime failures must be distinguishable.
          $BIN bogus-command > /dev/null 2>&1 && rc=0 || rc=$?
          if [ "$rc" -ne 2 ]; then
            echo "FAIL: unknown command exited $rc, expected 2"
            exit 1
          fi

          $BIN --help > /dev/null
          echo "OK: configuration and exit-code contracts hold"

  # ---------------------------------------------------------------------------
  # AddressSanitizer + UndefinedBehaviorSanitizer.
  # ---------------------------------------------------------------------------
  sanitize:
    name: sanitize (asan+ubsan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: cmake --preset sanitize

      - name: Build
        run: cmake --build --preset sanitize

      - name: Test
        env:
          # halt_on_error keeps a sanitizer report from being buried under
          # subsequent output; ASan and UBSan otherwise continue past the first
          # finding.
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --preset sanitize

  # ---------------------------------------------------------------------------
  # ThreadSanitizer.
  #
  # Runs only the tests labelled `concurrency`. There are none until Phase 12
  # introduces multithreading, so this job is allowed to report "no tests" until
  # then rather than fail on an empty selection.
  # ---------------------------------------------------------------------------
  thread-sanitize:
    name: sanitize (tsan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: cmake --preset tsan

      - name: Build
        run: cmake --build --preset tsan

      - name: Test concurrency paths
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: |
          set -euo pipefail
          if ctest --preset tsan --show-only=json-v1 | grep -q '"name"'; then
            ctest --preset tsan
          else
            echo "No concurrency-labelled tests yet (multithreading lands in Phase 12)."
          fi

  # ---------------------------------------------------------------------------
  # External cross-validation against QuantLib.
  #
  # Separate from the main matrix because QuantLib is an optional reference
  # (ADR-003): it links into one test target and nothing else, and a clean
  # checkout must build and test fully without it. Running it here keeps the
  # comparison honest evidence rather than a claim, without putting a heavy
  # dependency on every build.
  # ---------------------------------------------------------------------------
  quantlib-cross-validation:
    name: validate (quantlib)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and QuantLib
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 libquantlib0-dev libboost-dev

      - name: Configure with QuantLib enabled
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build/quantlib -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDW_BUILD_TESTS=ON \
            -DDW_ENABLE_QUANTLIB=ON

      # Discovery downgrades itself to a warning when QuantLib is absent, so a
      # broken install would otherwise silently skip the cross-validation and
      # report success. Fail loudly instead.
      - name: Verify QuantLib was actually found
        run: |
          set -euo pipefail
          if ! grep -q "DW_ENABLE_QUANTLIB:BOOL=ON" build/quantlib/CMakeCache.txt; then
            echo "FAIL: QuantLib discovery downgraded itself; the cross-validation would be skipped"
            exit 1
          fi
          echo "OK: QuantLib discovered"

      - name: Build cross-validation
        run: cmake --build build/quantlib --target dw_test_quantlib

      - name: Run cross-validation
        run: ctest --test-dir build/quantlib -L validation --output-on-failure

  # ---------------------------------------------------------------------------
  # High-precision reference fixture.
  #
  # The committed fixture must match what the generator produces, or the
  # "independent oracle" is really a snapshot of whatever the engine happened to
  # agree with when it was written.
  # ---------------------------------------------------------------------------
  reference-fixture:
    name: verify reference fixture
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Pinned to the versions the committed fixtures were generated with. mpmath
      # is deterministic, but a version bump could change how mp.diff chooses its
      # steps and shift the last digits, which would read as a spurious failure.
      # numpy and scipy are the independent cross-checks the generators run
      # internally: numpy confirms the Philox algorithm, scipy sanity-checks the
      # distribution values.
      - name: Install reference tooling
        run: pip install 'mpmath==1.4.1' 'numpy==2.0.2' 'scipy==1.13.1'

      - name: Regenerate and compare
        run: |
          set -euo pipefail

          python3 python/generate_bs_references.py > /tmp/bs.json
          python3 python/generate_philox_kat.py > /tmp/philox.json
          python3 python/generate_distribution_references.py > /tmp/dist.json
          python3 python/generate_random_stream_golden.py > /tmp/stream.json

          # Every fixture's numbers must reproduce from its generator. Provenance
          # carries a timestamp and commit, which differ by design; the values
          # must not. Without this the "independent oracle" is only a snapshot of
          # whatever the engine agreed with the day it was written.
          python3 - <<'EOF'
          import json, sys

          # (committed path, regenerated path, keys holding the values)
          fixtures = [
              ("data/references/black_scholes.json", "/tmp/bs.json", ["cases"]),
              ("data/references/philox_kat.json", "/tmp/philox.json", ["cases"]),
              (
                  "data/references/distributions.json",
                  "/tmp/dist.json",
                  ["inverse_norm_cdf", "student_t_cdf", "student_t_quantile"],
              ),
              (
                  "data/references/random_stream_golden.json",
                  "/tmp/stream.json",
                  ["cases", "reproducibility_tiers", "coordinates"],
              ),
          ]

          failed = False
          for committed_path, regenerated_path, keys in fixtures:
              with open(committed_path) as f:
                  committed = json.load(f)
              with open(regenerated_path) as f:
                  regenerated = json.load(f)

              for key in keys:
                  if committed[key] != regenerated[key]:
                      print(f"FAIL: {committed_path} key '{key}' does not match its generator")
                      failed = True
                  else:
                      count = len(committed[key])
                      print(f"OK: {committed_path} '{key}' reproduces ({count} entries)")

          sys.exit(1 if failed else 0)
          EOF

  # ---------------------------------------------------------------------------
  # Formatting.
  # ---------------------------------------------------------------------------
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Pinned via pip rather than apt. clang-format's output changes between
      # major versions, so an unpinned tool makes formatting depend on whichever
      # version the runner happens to ship. The pip package is the same build on
      # every platform, which lets a developer on macOS and CI on Linux agree.
      - name: Install clang-format
        run: pip install 'clang-format==20.1.7'

      - name: Check formatting
        run: |
          set -euo pipefail
          find include src tests -type f \
            \( -name '*.hpp' -o -name '*.cpp' \) \
            -exec clang-format --dry-run --Werror --style=file {} +
          echo "OK: formatting is clean"

  # ---------------------------------------------------------------------------
  # Static analysis.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # A header must include what it names.
  #
  # This job exists because of a real failure. Moving ConfidenceInterval out of
  # engines/pricing_result.hpp removed the only path by which
  # statistics/multi_seed.hpp was seeing <optional>. It kept compiling on macOS,
  # where libc++ supplies it through another route, and broke every compiling job
  # here, where libstdc++ does not -- with an error naming a struct member, in a
  # file the change never touched.
  #
  # The compiling jobs below would catch it again, but only after several minutes
  # and with a diagnostic that points at the wrong file. This runs in a second and
  # names the header and the include.
  # ---------------------------------------------------------------------------
  include-hygiene:
    name: include hygiene
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Every header includes what it names
        run: python3 scripts/check_includes.py

  static-analysis:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18

      # Pinned for the same reason as clang-format: check behaviour and
      # diagnostics change between major versions, so an unpinned tool makes the
      # analysis depend on the runner image.
      - name: Install clang-tidy
        run: pip install 'clang-tidy==20.1.0'

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: cmake --preset debug

      - name: Generate compilation database
        run: cmake --build --preset debug --target dw_git_info

      - name: Run clang-tidy on project sources
        run: |
          set -euo pipefail
          # Analyse only first-party translation units. Fetched dependencies are
          # compiled into the same database but are not this project's code.
          find src -type f -name '*.cpp' \
            -exec clang-tidy -p build/debug --warnings-as-errors='*' {} +
          echo "OK: static analysis is clean"

  # ---------------------------------------------------------------------------
  # The experiment machinery must keep working, and its published records must
  # keep matching the code that produced them.
  #
  # Not a re-run of the full studies: EXP-01 through EXP-04 at their published
  # configuration take minutes and are stochastic, so asserting their exact
  # numbers here would either be slow or flaky. What is checked is that every
  # experiment still runs end to end from its stored configuration, still emits a
  # complete record, and still reaches a defensible status -- and that the plotting
  # layer can regenerate every published figure from the committed records, which
  # EXPERIMENT-CATALOG's final gate requires.
  # ---------------------------------------------------------------------------
  experiments:
    name: experiment records and figures
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install plotting tooling
        run: pip install 'matplotlib==3.9.4'

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Fast experiments regenerate from their stored configuration
        run: |
          set -euo pipefail
          mkdir -p /tmp/records
          # A config->record smoke test on the experiments quick enough to run in
          # CI. EXP-07 (barrier, ~19 min) and the calibration studies are too slow
          # to regenerate on every push; their committed records are the source of
          # truth and are checked for artifacts and figure reproducibility below.
          for id in EXP-01 EXP-02 EXP-03 EXP-04; do
            ./build/release/src/diffusionworks experiment \
              --config configs/experiment/convergence.json \
              --id "$id" --output "/tmp/records/$id.json"
          done
          ./build/release/src/diffusionworks experiment \
            --config configs/experiment/pde.json --id EXP-06 \
            --output "/tmp/records/EXP-06.json"
          ./build/release/src/diffusionworks experiment \
            --config configs/experiment/greeks.json --id EXP-08 \
            --output "/tmp/records/EXP-08.json"

      - name: Every committed record carries every required artifact
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json, pathlib, sys

          # EXPERIMENT-CATALOG "Required Artifacts". A record missing any of these
          # is not publishable, so a missing field fails the build rather than
          # being noticed later by a reader. This runs over the committed records,
          # which are the ones a reader actually gets.
          required = [
              "id", "name", "question", "status", "interpretation", "limitations",
              "reproduction_command", "configuration", "results", "table",
              "runtime_seconds", "build_metadata",
          ]

          records = sorted(pathlib.Path("results").glob("EXP-*.json"))
          if not records:
              print("FAIL: no committed records found under results/")
              sys.exit(1)

          failed = False
          for path in records:
              record = json.loads(path.read_text())

              for field in required:
                  if field not in record:
                      print(f"FAIL: {path.name} is missing '{field}'")
                      failed = True

              # An experiment claiming no limitations has not been thought about.
              if not record.get("limitations"):
                  print(f"FAIL: {path.name} lists no limitations")
                  failed = True

              # A failed experiment is a result and must be preserved, but it must
              # not pass CI silently either.
              if record["status"] == "fail":
                  print(f"FAIL: {record['id']} reports status 'fail'")
                  for limitation in record["limitations"]:
                      print(f"  - {limitation}")
                  failed = True
              else:
                  print(f"OK: {record['id']} {record['status']}")

          sys.exit(1 if failed else 0)
          EOF

      - name: Every published figure regenerates from its committed record
        run: |
          set -euo pipefail
          # EXPERIMENT-CATALOG's final gate requires that all published charts can
          # be regenerated automatically. Every figure committed under
          # docs/figures/ must therefore be reproducible from a committed record.
          # Each plotter renders the ids it owns and skips the rest, so both are
          # run over the whole record set.
          python3 python/plot_convergence.py results/EXP-*.json --outdir /tmp/figures
          python3 python/plot_experiments.py results/EXP-*.json --outdir /tmp/figures
          for figure in docs/figures/*.png; do
            name=$(basename "$figure")
            if [ ! -f "/tmp/figures/$name" ]; then
              echo "FAIL: $name is committed but no record regenerates it"
              exit 1
            fi
          done
          echo "OK: every committed figure regenerates from its record"

  # ---------------------------------------------------------------------------
  # The documentation is an artifact too. A paper whose numbers have drifted from
  # the records, a methodology note linking to a renamed file, or a figure nobody
  # references is a defect a reader cannot be expected to catch. These checks read
  # only committed files, so they need no build.
  # ---------------------------------------------------------------------------
  documentation:
    name: documentation and claims
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Links resolve, figures are referenced, removed scope stays removed
        run: python3 python/check_docs.py

      - name: Every headline claim re-derives from a committed record
        run: python3 python/verify_claims.py

      - name: The artifact set is complete
        run: python3 python/generate_manifest.py --check
